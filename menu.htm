<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main>
        
        <section class="menu-section">

            <div class="menu-header">
                <h1>Menu</h1>

            <div class="menu-wrapper">

               <div class="menu-card">
                    <h3>main course</h3>
                    <span class="item-name">cheese burger</span>
                    <span class="item-price">k18,000</span>
                    <img src="thumbnails/Burger.jpg" alt="food" class="menu-image">
               </div>

              
               <div class="menu-card">
                      <h3>appetizer</h3>
               <span class="item-name">Fruit Salad</span>
               <span class="item-price">K7,000</span>
               <img src="thumbnails/Salad.jpg" alt="food" class="menu-image">
               </div>
               
                <div class="menu-card">
                         <h3>Deserts</h3>
                         <span class="item-name">Chocolate Cake</span>   
                         <span class="item-price">K10,000</span>
                         <img src="thumbnails/CAKE.jpg" alt="food" class="menu-image">
                </div>
                

            </div>

        </section>

    </main>
    
</body>
</html>
