<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <!--sign up form-->
        <section class="signup"> 
            <div class="signup-wrapper">
                
                <div class="signup-logo">
                    <h3>Sign up Trefecta</h3>
                </div>

                <form class="signup-form">
                    <div class="input-container">
                        <input class="input-text" type="text" placeholder="Email" required>
                        <input class="input-text" type="text" placeholder="Username" required>
                        <input class="input-text" type="password" placeholder="Password" required>
                    </div>
                    <div class="checkbox">
                        <input type="checkbox"> <p>I agree terms and conditions</p>
                    </div>
                    <div class="btn-container">
                        <button class="btn" type="submit">Create account</button>
                    </div>
                    <div class="p-container">
                        <p class="text">If you already have an account? <a class="sign-in" href="#">Sign in</a></p> 
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
